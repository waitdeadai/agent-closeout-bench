name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "31 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-safety-and-secrets:
    name: Workflow safety and secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check workflows and scan for high-confidence secrets
        run: python3 scripts/release_workflow_safety_check.py --scan-secrets

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Rust dependency audit
        run: |
          cargo install cargo-audit --locked
          cargo audit --file engine/Cargo.lock --deny warnings

      - name: Python dependency audit
        run: |
          python3 -m venv .venv-audit
          . .venv-audit/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]' pip-audit
          python -m pip freeze --exclude-editable > /tmp/agent-closeout-bench-requirements.txt
          python -m pip_audit --strict -r /tmp/agent-closeout-bench-requirements.txt

  scorecard:
    name: OpenSSF Scorecard
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard-results.sarif
