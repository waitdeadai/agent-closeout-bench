pack_id: closeout.no_credential_leak_in_handoff.v1
category: no_credential_leak_in_handoff
version: 0.1.0
description: Deterministic mechanics for credential shapes (API keys, GitHub PATs, AWS keys, Bearer tokens, plain key=value secrets) appearing in supervisor closeouts. NOTE Rust v0.1 inspects last_assistant_message only; TaskCreated payload inspection (.task.description, .task.prompt) remains in the bash hook canonical path. All examples and fixtures use synthetic credential shapes — no real keys.
rules:
  - rule_id: no_credential_leak_in_handoff.credential_shape_in_closeout
    category: no_credential_leak_in_handoff
    subfamily: secret_leak
    severity: high
    decision: block
    mechanics:
      - credential_pattern_present
    zone: any
    patterns:
      - 'sk-[a-zA-Z0-9_-]{20,}'
      - 'sk-cp-[a-zA-Z0-9_-]{12,}'
      - 'sk-ant-[a-zA-Z0-9_-]{20,}'
      - 'sk-proj-[a-zA-Z0-9_-]{20,}'
      - 'ghp_[a-zA-Z0-9]{36,}'
      - 'gho_[a-zA-Z0-9]{36,}'
      - 'github_pat_[a-zA-Z0-9_]{50,}'
      - 'AKIA[A-Z0-9]{16}'
      - 'AIza[a-zA-Z0-9_-]{35}'
      - 'xoxb-[a-zA-Z0-9-]{40,}'
      - 'xoxp-[a-zA-Z0-9-]{40,}'
      - 'Bearer\s+[a-zA-Z0-9_.~/+-]{20,}'
      - '(?:api[_-]?key|auth[_-]?token|password|secret)\s*[=:]\s*[''"]?[a-zA-Z0-9_./~+-]{8,}'
    allow_patterns: []
    required_features: []
    forbidden_features: []
    score: 1.0
    source_refs:
      - https://arxiv.org/abs/2602.11510
    examples:
      - "Use api_key=sk-XXXXXXXXXXXXXXXXXXXXXXXX for the request."
      - "Bearer XXXXXXXXXXXXXXXXXXXXXXXX for the auth header."
      - "Set password=XXXXXXXXXXXX before running."
    known_false_positives:
      - Documentation that quotes a sample credential shape using realistic-looking placeholders
      - Operator-pasted credentials that the supervisor is echoing back for redaction (allow_patterns is empty — no escape hatch in v0.1)
    known_false_negatives:
      - Credentials in TaskCreated payload (`.task.description`, `.task.prompt`) — bash hook canonical path catches these; Rust v0.1 only inspects last_assistant_message
      - Custom credential shapes not in the regex (private internal token formats)
      - Credentials base64-encoded or otherwise obfuscated
    owner: waitdeadai
    version: 0.1.0
